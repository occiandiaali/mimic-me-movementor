      // Utility: detect video duration
      function getVideoDuration(url) {
        return new Promise((resolve) => {
          const video = document.createElement("video");
          video.src = url;
          video.onloadedmetadata = () => {
            resolve(video.duration); // duration in seconds
          };
        });
      }

      // Upload handler with duration validation
      function uploadFile(e, type) {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);

          // Check duration if it's a video
          if (file.type.startsWith("video")) {
            getVideoDuration(url).then((duration) => {
              if (duration > state.maxDuration) {

              state[type] = url;
              m.redraw();
            });
          } else {

            state[type] = url;
            m.redraw();
          }
        }

      // Pose detector initialization (singleton)
      async function initDetector() {
        if (!state.detector) {
          state.detector = await poseDetection.createDetector(
            poseDetection.SupportedModels.MoveNet,
            { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING },
          );
        }
      }

      async function extractPoses(videoEl) {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        let poses = [];

        return new Promise((resolve) => {
          const start = async () => {
            canvas.width = videoEl.videoWidth;
            canvas.height = videoEl.videoHeight;

            const step = async () => {
              if (videoEl.paused || videoEl.ended) {
                resolve(poses);
                return;
              }
              ctx.drawImage(videoEl, 0, 0, canvas.width, canvas.height);
              const pose = await state.detector.estimatePoses(canvas);
              if (pose.length > 0) poses.push(pose[0]);
              // console.log("Poses ", poses);
              requestAnimationFrame(step);
            };

            videoEl
              .play()
              .catch((err) => console.error("Video play failed:", err));
            step();
          };

          if (videoEl.readyState >= 2) {
            videoEl.muted = true;
            start();
          } else {
            videoEl.onloadeddata = start;
          }
        });
      }

      // Normalize keypoints relative to video dimensions
      function normalizeKeypoints(keypoints, width, height) {
        return keypoints.map((kp) => ({
          x: kp.x / width,
          y: kp.y / height,
          score: kp.score,
        }));
      }

      // Compare two sets of poses with normalization + confidence weighting
      function comparePoses(posesA, posesB, widthA, heightA, widthB, heightB) {
        let scores = [];
        let len = Math.min(posesA.length, posesB.length);

        for (let i = 0; i < len; i++) {
          let keypointsA = normalizeKeypoints(
            posesA[i].keypoints,
            widthA,
            heightA,
          );
          let keypointsB = normalizeKeypoints(
            posesB[i].keypoints,
            widthB,
            heightB,
          );

          let sum = 0,
            weightSum = 0;

          for (let j = 0; j < keypointsA.length; j++) {
            let ax = keypointsA[j].x,
              ay = keypointsA[j].y;
            let bx = keypointsB[j].x,
              by = keypointsB[j].y;

            let dist = Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
            let weight = (keypointsA[j].score + keypointsB[j].score) / 2;

            sum += dist * weight;
            weightSum += weight;
          }

          let avgDist =
            weightSum > 0 ? sum / weightSum : sum / keypointsA.length;
          let similarity = Math.max(0, 100 - avgDist * 200); // scaling factor
          scores.push(similarity);
        }

        return scores.reduce((a, b) => a + b, 0) / scores.length;
      }

      async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true,
        });

        const videoEl = document.getElementById("cameraPreview");
        videoEl.srcObject = null; // clear previous
        videoEl.srcObject = stream;
        videoEl.play();
        state.stream = stream;
        state.recordedChunks = [];

        state.mediaRecorder = new MediaRecorder(stream);
        state.mediaRecorder.ondataavailable = (e) => {
          if (e.data.size > 0) state.recordedChunks.push(e.data);
        };
        state.mediaRecorder.onstop = () => {
          const blob = new Blob(state.recordedChunks, { type: "video/webm" });
          state.reenactmentClip = URL.createObjectURL(blob);
          state.progress = 0;
          m.redraw();
        };

        // Countdown before recording starts
        state.countdown = 6;
        m.redraw();

        let countdownInterval = setInterval(() => {
          state.countdown--;
          m.redraw();

          if (state.countdown <= 0) {
            clearInterval(countdownInterval);

            // Start recording
            state.mediaRecorder.start();
            state.recording = true;
            state.countdown = null;
            m.redraw();

            // Stop automatically after original clip duration
            getVideoDuration(state.originalClip).then((duration) => {
              let elapsed = 0;
              let progressInterval = setInterval(() => {
                elapsed++;
                state.progress = Math.min(100, (elapsed / duration) * 100);
                m.redraw();

                if (elapsed >= duration) {
                  clearInterval(progressInterval);
                  stopRecording();
                }
              }, 1000);
            });
          }
        }, 1000);
      }

      function stopRecording() {
        if (state.stream) {
          state.stream.getTracks().forEach((track) => track.stop()); // stop camera + mic
          state.stream = null;
        }

        if (state.mediaRecorder) {
          state.mediaRecorder.stop();
          state.mediaRecorder = null;
        }

        state.recording = false;
        m.redraw();
      }
